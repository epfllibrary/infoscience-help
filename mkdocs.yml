site_name: Infoscience Help
site_url: https://help-infoscience.epfl.ch/
site_description: >-
  Infoscience Help is the official documentation for the Infoscience institutional
  repository of EPFL. It provides comprehensive guides, FAQs, and resources to
  assist researchers in depositing, managing, and maximizing the visibility of
  their research outputs on the Infoscience platform.
site_author: EPFL Library – Infoscience Team
repo_url: https://github.com/epfllibrary/infoscience-help
repo_name: epfllibrary/infoscience-help
edit_uri: edit/main/docs/
use_directory_urls: false

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/images/infoscience-logo.svg
  favicon: assets/images/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.action.edit
    - content.action.view
    - toc.follow

extra_css:
  - assets/css/infoscience-theme.css
  - assets/css/metadata-profile.css


extra_javascript:
  # - assets/js/search-language-filter.js
  - assets/js/metadata-profile.js
  - assets/js/support-modal.js
  - assets/js/page-footer-cta.js

copyright: >-
  <a href="https://epfl.ch" title="Infoscience Help" class="md-header__button md-logo" aria-label="Infoscience Help" data-md-component="logo"> 
  <img src="https://help-infoscience.epfl.ch/assets/images/epfl.svg" alt="logo">
  </a>
  <strong>Infoscience</strong> &nbsp;·&nbsp;
  <a href="https://infoscience.epfl.ch" target="_blank">infoscience.epfl.ch</a>
  &nbsp;&nbsp;|&nbsp;&nbsp;
  <a href="https://www.epfl.ch/about/overview/regulations-and-guidelines/disclaimer/" target="_blank">Legal notice</a>
  &nbsp;·&nbsp;
  <a href="https://www.epfl.ch/about/overview/regulations-and-guidelines/epfl-privacy-policy/" target="_blank">Privacy policy</a>
  &nbsp;&nbsp;|&nbsp;&nbsp;
  &copy; 2025 <a href="https://library.epfl.ch" target="_blank">EPFL Library</a> &ndash;
  <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a>

plugins:
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      skip_classes:
        - custom-skip-class-name
      auto_themed: false
      auto_caption: false
      caption_position: bottom
      background: white
      shadow: true
      manual: false
  - search:
      lang: [en, fr]
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - meta:
      meta_file: .meta.yml
  - social:
      cards: true
      cards_layout_options:
        background_color: "#007480"
        color: "#ffffff"
      cards_layout: default/variant
  - i18n:
      docs_structure: suffix
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fr
          name: Français
          build: true
          nav_translations:
            # Top-level sections
            Home: Accueil
            Deposit: Déposer
            Manage: Gérer
            Search & Reuse: Rechercher et réutiliser
            Miscellaneous: Divers
            # Deposit section
            Submit a publication: Déposer une publication
            Use the submission form: Utiliser le formulaire de dépôt
            File naming and formats: Nommage et formats de fichiers
            Document types: Types de documents
            # Manage section
            My publications: Mes publications
            My profile: Mon profil
            My lab/unit page: La page de mon labo/unité
            Publication lists: Listes de publications
            Annual Academic Report (AAR): Rapport Académique Annuel (AAR)
            # Search & Reuse section
            Search and consult: Rechercher et consulter
            Identifiers (DOI, Handle, ISBN): Identifiants (DOI, Handle, ISBN)
            Export and reuse data (OAI, API): Exporter et réutiliser les données
            # Miscellaneous section
            Data model: Modèle de données
            Metadata Application Profile: Profil d'application des métadonnées
            FAQ: FAQ
            Book an Infoscience expert: Réserver un expert Infoscience
            Charter, deposit licence and conditions of use: Charte, licence de dépôt et conditions d'utilisation

nav:
  - Home: index.md
  - Deposit:
      - Submit a publication: submit-a-publication.md
      - Use the submission form: use-submission-form.md
      - File naming and formats: file-naming-formats.md
      - Document types: document-types.md
  - Manage:
      - My publications: manage-publications.md
      - My profile: manage-profile.md
      - My lab/unit page: manage-lab-unit.md
      - Publication lists: publication-lists.md
      - Academic Annual Report (AAR): aar.md
  - Search & Reuse:
      - Search and consult: search-and-consult.md
      - Identifiers (DOI, Handle, ISBN): identifiers.md
      - Export and reuse data (OAI, API): export-reuse.md
  - Miscellaneous:
      - Data model: data-model.md
      - Metadata Application Profile: metadata-profile.md
      - FAQ: faq.md
      - Book an Infoscience expert: https://go.epfl.ch/book-an-infoscience-expert
      - Charter, deposit licence and conditions of use: https://www.epfl.ch/campus/library/services-researchers/infoscience-en/charter-deposit-licence-and-conditions-of-use/

extra:
  meta:
    # ── Indexing ─────────────────────────────────────────────────────────
    - name: robots
      content: index, follow, max-snippet:-1, max-image-preview:large
    - name: googlebot
      content: index, follow

    # ── Authorship & copyright ────────────────────────────────────────────
    - name: author
      content: EPFL Library – Infoscience Team
    - name: copyright
      content: "© 2025 EPFL Library – CC BY 4.0"
    - name: language
      content: en

    # ── Keywords (institutional context, not keyword stuffing) ────────────
    - name: keywords
      content: >-
        Infoscience, EPFL, institutional repository, open access, DSpace,
        research publications, deposit, DOI, ORCID, researcher profile,
        publication list, metadata, data model, OpenAIRE, OAI-PMH,
        bibliographic export, scientific output, EPFL Library

    # ── Open Graph ────────────────────────────────────────────────────────
    - property: og:type
      content: website
    - property: og:site_name
      content: Infoscience Help — EPFL Library
    - property: og:image
      content: https://help-infoscience.epfl.ch/assets/images/infoscience-support.png
    - property: og:image:width
      content: "1200"
    - property: og:image:height
      content: "630"
    - property: og:image:alt
      content: Infoscience Help — EPFL institutional repository documentation
    - property: og:locale
      content: en_US
    - property: og:locale:alternate
      content: fr_FR

    # ── Twitter / X card ──────────────────────────────────────────────────
    - name: twitter:card
      content: summary_large_image
    - name: twitter:site
      content: "@EPFL_en"
    - name: twitter:creator
      content: "@EPFLLibrary"
    - name: twitter:image
      content: https://help-infoscience.epfl.ch/assets/images/infoscience-support.png

    # ── Schema.org WebSite (global) ───────────────────────────────────────
    - name: application-name
      content: Infoscience Help
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: Français
      link: /fr/
      lang: fr
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:infoscience@epfl.ch
      name: infoscience@epfl.ch
    - icon: fontawesome/solid/phone
      link: tel:+41216932156
      name: +41 21 693 21 56
    - icon: fontawesome/solid/globe
      link: https://infoscience.epfl.ch
      name: Infoscience platform
    - icon: fontawesome/solid/calendar-check
      link: https://go.epfl.ch/book-an-infoscience-expert
      name: Book an Infoscience expert
  analytics:
    provider: google
    property: G-RDGTVQFPL6
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this page by
            using our <a href="https://infoscience.epfl.ch/info/feedback" target="_blank" rel="noopener">feedback form</a>.    
  # consent:
  #   title: Cookie consent
  #   description: >- 
  #     We use cookies to recognize your repeated visits and preferences, as well
  #     as to measure the effectiveness of our documentation and whether users
  #     find what they're searching for. With your consent, you're helping us to
  #     make our documentation better.

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
